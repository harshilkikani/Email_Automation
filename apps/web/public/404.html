<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Keres AI</title>
    <!-- GitHub Pages SPA routing: encode the path into a query string so
         the main index.html can restore it via history.replaceState.
         pathSegmentsToKeep=1 for project pages (github.io/repo-name/…). -->
    <script>
      var s=1;
      var l=window.location;
      l.replace(
        l.protocol+'//'+l.hostname+(l.port?':'+l.port:'')+
        l.pathname.split('/').slice(0,1+s).join('/')+'/?/'+
        l.pathname.slice(1).split('/').slice(s).join('/').replace(/&/g,'~and~')+
        (l.search?'&'+l.search.slice(1).replace(/&/g,'~and~'):'')+
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
