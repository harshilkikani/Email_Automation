<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Keres AI — Email Operations</title>
    <!-- GitHub Pages SPA routing: restore path encoded by 404.html -->
    <script>
      (function(l){if(l.search[1]==='/')var d=l.search.slice(1).split('&').map(function(s){return s.replace(/~and~/g,'&')}).join('?');d&&window.history.replaceState(null,null,l.pathname.slice(0,-1)+d+l.hash)}(window.location));
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
