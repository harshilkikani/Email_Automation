name: deploy

# Deploys to Fly.io on every push to main, but only after `test.yml` passed.
# Add FLY_API_TOKEN to repo Secrets before the first run.
#   gh secret set FLY_API_TOKEN --body "$(flyctl tokens create deploy)"
on:
  workflow_run:
    workflows: ["test"]
    types: [completed]
    branches: [main]

jobs:
  fly-deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    concurrency: deploy-${{ github.ref }}
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        if: ${{ env.FLY_API_TOKEN != '' }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only
      - name: Skip (no FLY_API_TOKEN secret)
        if: ${{ env.FLY_API_TOKEN == '' }}
        run: echo "FLY_API_TOKEN not set — skipping deploy. Add it via gh secret set FLY_API_TOKEN to enable."
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
