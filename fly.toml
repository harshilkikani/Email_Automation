# Fly.io app config — Keres AI (v3.1 sub-$5/mo target).
#
# Auto-stop machines minimise idle cost. Cloudflare Cron pings /api/health
# at 7am M–F to wake the machine before the operator starts work and to keep
# Neon's compute warm.
app = "keres-ops"
primary_region = "iad"

[build]
  dockerfile = "apps/server/Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[checks.health]
  type = "http"
  port = 8080
  path = "/api/health"
  interval = "30s"
  timeout = "5s"
  grace_period = "30s"
  method = "GET"

[checks.ready]
  type = "http"
  port = 8080
  path = "/api/ready"
  interval = "60s"
  timeout = "10s"
  grace_period = "60s"
  method = "GET"

[env]
  NODE_ENV = "production"
  PORT = "8080"
